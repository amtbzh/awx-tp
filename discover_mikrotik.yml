---
- name: "Test de connexion SSH Universel"
  hosts: switch-tete
  gather_facts: no

  tasks:
    - name: Test de validation locale
      ansible.builtin.debug:
        msg: "Tentative de connexion via SSH standard (OpenSSH)..."

    - name: Envoyer une commande de test au switch
      ansible.netcommon.cli_command:
        command: "show version"
      register: ssh_test

    - name: Afficher le résultat de la connexion
      ansible.builtin.debug:
        msg: "Connexion réussie ! Réponse du switch : {{ ssh_test.stdout }}"
