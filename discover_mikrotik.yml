---
- name: "Test de connexion SSH avec le Switch Cisco"
  hosts: switch-tete
  gather_facts: no
  connection: ansible.netcommon.network_cli
  
  # On force TOUTES les variables de contournement SSH directement ici
  vars:
    ansible_ssh_common_args: '-o KexAlgorithms=+diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1 -o HostKeyAlgorithms=+ssh-rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
    ansible_ssh_transfer_method: piped
    ansible_paramiko_interactive_driver_options:
      key_exchange_algorithms:
        - diffie-hellman-group14-sha1
        - diffie-hellman-group-exchange-sha1

  tasks:
    - name: Envoyer une commande de test au switch
      cisco.ios.ios_command:
        commands:
          - show version | include System image file
      register: ssh_test

    - name: Afficher le résultat de la connexion
      ansible.builtin.debug:
        msg: "Connexion SSH réussie ! Réponse du switch : {{ ssh_test.stdout[0] }}"
