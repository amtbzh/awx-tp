---
- name: "Test de connexion SSH via Shell"
  hosts: localhost
  gather_facts: no

  vars:
    target_host: "{{ hostvars['switch-tete']['ansible_host'] | default('10.200.171.101') }}"
    target_user: "{{ hostvars['switch-tete']['ansible_user'] | default('admin') }}"

  tasks:
    - name: Tenter la connexion SSH en forçant la réactivation globale de RSA
      ansible.builtin.shell: >
        sshpass -p "{{ ansible_password }}" ssh 
        -o StrictHostKeyChecking=no 
        -o UserKnownHostsFile=/dev/null 
        -o KexAlgorithms=+diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1 
        -o HostKeyAlgorithms=+ssh-rsa,ssh-dss 
        -o PubkeyAcceptedKeyTypes=+ssh-rsa 
        {{ target_user }}@{{ target_host }} "show version"
      register: ssh_test

    - name: Afficher le résultat de la connexion
      ansible.builtin.debug:
        var: ssh_test.stdout_lines
