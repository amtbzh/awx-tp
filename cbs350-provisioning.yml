---
- name: Test SSH brut sur le switch
  hosts: cbs350-provisioning
  gather_facts: false
  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: ios

  tasks:
    - name: Lancer une commande show version
      ansible.netcommon.cli_command:
        command: "show version"
      register: result

    - name: Afficher la sortie brute
      ansible.builtin.debug:
        var: result.stdout_lines
